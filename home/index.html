<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kris | Portfolio</title>
  <meta name="description" content="Kris Lu — Senior UX Designer & Product Owner. 7+ years designing enterprise software for manufacturing." />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="stylesheet" href="../styles/heroui-tokens.css" />
  <link rel="stylesheet" href="../styles/heroui-kit.css" />
  <link rel="stylesheet" href="../styles/portfolio.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    window.PORTFOLIO_PATHS = {
      assets: "../",
      home: "../home/",
      works: ["../work-1-EdgePQM/", "../work-2-PVS/", "../work-3-ADJ/"]
    };
  </script>


  <script src="../content.js"></script>
  <script src="../image-protection.js"></script>
  <script type="text/babel" src="../components/HeroUI.jsx"></script>
  <script type="text/babel" src="../tweaks-panel.jsx"></script>
  <script type="text/babel" src="../components/Sections.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Theme keys persisted via Tweaks
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "light",
      "lang": "zh",
      "accent": "#006FEE",
      "radius": 8,
      "fontDisplay": "Geist",
      "density": "comfy"
    }/*EDITMODE-END*/;

    // Merge persisted lang/theme from localStorage so cross-page state is continuous
    const _persisted = { theme: localStorage.getItem("kl-theme"), lang: localStorage.getItem("kl-lang") };
    if (_persisted.theme) TWEAK_DEFAULTS.theme = _persisted.theme;
    if (_persisted.lang)  TWEAK_DEFAULTS.lang  = _persisted.lang;

    function applyTheme(theme) {
      document.documentElement.classList.toggle("dark", theme === "dark");
      document.documentElement.setAttribute("data-theme", theme);
    }

    function applyAccent(hex) {
      // Convert hex to oklch via canvas-free trick: just set as raw color
      // since CSS can use hex directly through oklch tokens? simplest: override --accent and --focus
      document.documentElement.style.setProperty("--accent", hex);
      document.documentElement.style.setProperty("--accent-hover", hex);
      document.documentElement.style.setProperty("--accent-soft", hex + "26"); // ~15% alpha
      document.documentElement.style.setProperty("--accent-soft-foreground", hex);
      document.documentElement.style.setProperty("--focus", hex);
    }

    function applyRadius(px) {
      document.documentElement.style.setProperty("--radius", px + "px");
    }

    function applyFont(family) {
      const stack = `"${family}", "Noto Sans TC", ui-sans-serif, system-ui, -apple-system, sans-serif`;
      document.documentElement.style.setProperty("--font-sans", stack);
    }

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const lang = tweaks.lang || "zh";
      const theme = tweaks.theme || "light";
      const t = window.PORTFOLIO_CONTENT[lang];

      // sync html lang
      useEffect(() => {
        document.documentElement.lang = lang === "zh" ? "zh-TW" : "en";
      }, [lang]);

      useEffect(() => { applyTheme(theme); }, [theme]);
      useEffect(() => { applyAccent(tweaks.accent || "#006FEE"); }, [tweaks.accent]);
      useEffect(() => { applyRadius(tweaks.radius || 8); }, [tweaks.radius]);
      useEffect(() => { applyFont(tweaks.fontDisplay || "Geist"); }, [tweaks.fontDisplay]);

      const setTheme = (v) => { setTweak("theme", v); localStorage.setItem("kl-theme", v); };
      const setLang = (v) => { setTweak("lang", v); localStorage.setItem("kl-lang", v); };

      return (
        <>
          <Nav lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} t={t} />
          <Hero t={t} />
          <About t={t} />
          <Experience t={t} />
          <Works t={t} />
          <Skills t={t} />
          <EduAwards t={t} />
          <CTA t={t} />
          <Footer t={t} />

          <TweaksPanel title="Tweaks">
            <TweakSection label="Appearance">
              <TweakRadio label="Theme" value={theme}
                options={[{value:"light",label:"Light"},{value:"dark",label:"Dark"}]}
                onChange={(v) => setTweak("theme", v)} />
              <TweakRadio label="Language" value={lang}
                options={[{value:"zh",label:"中文"},{value:"en",label:"English"}]}
                onChange={(v) => setTweak("lang", v)} />
            </TweakSection>
            <TweakSection label="Color">
              <TweakColor label="Accent" value={tweaks.accent}
                onChange={(v) => setTweak("accent", v)} />
              <div style={{display:"flex", gap:6, flexWrap:"wrap", marginTop:8}}>
                {[
                  ["#006FEE", "HeroUI Blue"],
                  ["#7C3AED", "Violet"],
                  ["#10B981", "Emerald"],
                  ["#F59E0B", "Amber"],
                  ["#EF4444", "Red"],
                  ["#0F172A", "Ink"]
                ].map(([c, name]) => (
                  <button key={c} onClick={() => setTweak("accent", c)}
                    title={name}
                    style={{
                      width: 28, height: 28, borderRadius: 999,
                      background: c, border: "2px solid var(--border)",
                      cursor:"pointer", outline: tweaks.accent === c ? "2px solid var(--foreground)" : "none",
                      outlineOffset: 2
                    }} />
                ))}
              </div>
            </TweakSection>
            <TweakSection label="Typography">
              <TweakSelect label="Display Font" value={tweaks.fontDisplay}
                options={["Geist", "Inter", "DM Sans", "Manrope", "Plus Jakarta Sans", "Space Grotesk", "Instrument Serif"]}
                onChange={(v) => {
                  setTweak("fontDisplay", v);
                  // Inject Google Font link if not yet
                  const id = "gfont-" + v.replace(/\s+/g, "-");
                  if (!document.getElementById(id)) {
                    const link = document.createElement("link");
                    link.id = id;
                    link.rel = "stylesheet";
                    link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(v)}:wght@400;500;600;700&display=swap`;
                    document.head.appendChild(link);
                  }
                }} />
            </TweakSection>
            <TweakSection label="Shape">
              <TweakSlider label="Radius" min={0} max={20} step={1}
                value={tweaks.radius} unit="px"
                onChange={(v) => setTweak("radius", v)} />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    // Inject Google Font links for the alternative display font choices
    ["Inter", "DM Sans", "Manrope", "Plus Jakarta Sans", "Space Grotesk", "Instrument Serif"].forEach(v => {
      const id = "gfont-" + v.replace(/\s+/g, "-");
      if (!document.getElementById(id)) {
        const link = document.createElement("link");
        link.id = id;
        link.rel = "stylesheet";
        link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(v)}:wght@400;500;600;700&display=swap`;
        document.head.appendChild(link);
      }
    });

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
