              <div className="cs-num">{c.s5.num} / {c.s5.title}</div>
              <h2 className="cs-h2">{c.s5.title}</h2>
              <p className="cs-body">{c.s5.p1}</p>
              <div className="outcome-grid">
                {c.s5.outcomes.map((o, i) => (
                  <div className="outcome-card" key={i}>
                    <div className="outcome-n">{o.n}</div>
                    <div className="outcome-l">{o.l}</div>
                  </div>
                ))}
              </div>
              <div style={{
                marginTop: 56, padding: "32px 36px",
                background: "var(--surface)", border: "1px solid var(--border)",
                borderRadius: "var(--radius-2xl)"
              }}>
                <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: "var(--muted-foreground)", fontWeight: 700, marginBottom: 14 }}>
                  {c.s5.reflection_title}
                </div>
                <div style={{ fontSize: "clamp(16px, 1.4vw, 18px)", lineHeight: 1.7, color: "var(--foreground)" }}
                  className="reflection-body"
                  dangerouslySetInnerHTML={{ __html: c.s5.reflection }} />
              </div>
            </div>
          </section>

          {/* ── Prev / Next ── */}
          <section style={{ borderTop: "1px solid var(--border)", padding: "48px 0" }}>
            <div className="container" style={{ display: "flex", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
              <a href="../home/#works" className="button button--outline">
                {lang === "zh" ? "← 返回作品列表" : "← All Works"}
              </a>
              <a href="../work-2-PVS/" className="button button--outline">
                {lang === "zh" ? "下一個作品 →" : "Next Case →"}
              </a>
            </div>
          </section>

          <Footer t={t} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
