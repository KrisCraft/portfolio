<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet" />
  <title>Kris | Edge PQM</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="stylesheet" href="../styles/heroui-tokens.css" />
  <link rel="stylesheet" href="../styles/heroui-kit.css" />
  <link rel="stylesheet" href="../styles/portfolio.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    .cs-section { padding: 80px 0; }
    .cs-section + .cs-section { border-top: 1px solid var(--border); }
    .cs-num {
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--accent); font-weight: 700; margin-bottom: 12px;
    }
    .cs-h2 {
      font-size: clamp(26px, 3vw, 36px); font-weight: 700;
      letter-spacing: -0.02em; line-height: 1.2; margin: 0 0 24px;
    }
    .cs-body {
      font-size: clamp(16px, 1.4vw, 18px); line-height: 1.7;
      color: var(--muted-foreground); max-width: 680px;
    }
    .cs-body + .cs-body { margin-top: 16px; }
    .cs-body em { color: var(--foreground); font-style: normal; font-weight: 600; }
    .cs-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
    @media (max-width: 860px) { .cs-2col { grid-template-columns: 1fr; gap: 40px; } }
    .cs-img {
      width: 100%; border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      display: block;
    }
    .cs-img-caption {
      font-size: 13px; color: var(--muted-foreground);
      margin-top: 10px; line-height: 1.5;
    }
    .insight-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 40px; }
    @media (max-width: 860px) { .insight-grid { grid-template-columns: 1fr; } }
    .insight-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 28px 24px;
      transition: border-color 200ms, transform 200ms;
    }
    .insight-card:hover { border-color: color-mix(in oklab, var(--accent) 40%, var(--border)); transform: translateY(-2px); }
    .insight-num {
      font-size: 32px; font-weight: 800; color: var(--accent);
      letter-spacing: -0.03em; line-height: 1; margin-bottom: 14px;
      font-variant-numeric: tabular-nums;
    }
    .insight-title { font-size: 16px; font-weight: 650; margin: 0 0 8px; }
    .insight-desc { font-size: 14px; color: var(--muted-foreground); line-height: 1.6; margin: 0; }
    .decision-list { display: flex; flex-direction: column; gap: 40px; margin-top: 40px; }
    .decision-item {
      display: grid; grid-template-columns: 56px 1fr 320px;
      gap: 0 32px; align-items: start;
      padding-top: 32px; border-top: 1px solid var(--border);
    }
    .decision-item:first-child { border-top: none; padding-top: 0; }
    @media (max-width: 960px) {
      .decision-item { grid-template-columns: 56px 1fr; }
      .decision-img-col { display: none; }
    }
    .decision-idx {
      font-size: 13px; font-weight: 700; color: var(--muted-foreground);
      letter-spacing: 0.06em; padding-top: 3px;
    }
    .decision-title { font-size: 19px; font-weight: 650; margin: 0 0 10px; letter-spacing: -0.01em; }
    .decision-body { font-size: 15px; color: var(--muted-foreground); line-height: 1.65; margin: 0; }
    .outcome-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 40px; }
    @media (max-width: 860px) { .outcome-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .outcome-grid { grid-template-columns: 1fr; } }
    .outcome-card {
      background: var(--tint, var(--muted)); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 28px 20px; text-align: center;
    }
    .outcome-n { font-size: 36px; font-weight: 800; color: var(--accent); letter-spacing: -0.03em; line-height: 1.1; }
    .outcome-l { font-size: 13px; color: var(--muted-foreground); margin-top: 8px; line-height: 1.4; white-space: pre-line; }
    .role-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent-soft); color: var(--accent-soft-foreground);
      border-radius: 999px; padding: 6px 14px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
    }
    .case-summary {
      margin-top: 36px; display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 860px) { .case-summary { grid-template-columns: 1fr; } }
    .case-summary-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 18px 20px;
    }
    .case-summary-card .k {
      font-size: 11px; color: var(--accent); font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px;
    }
    .case-summary-card .v {
      font-size: 14px; color: var(--foreground); line-height: 1.6; margin: 0;
    }
    .cs-full-img {
      width: 100%; border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      box-shadow: 0 12px 48px rgba(0,0,0,0.13);
      display: block; margin: 0 auto;
    }
    .reflection-body p { margin: 0; }
    .reflection-body p + p { margin-top: 18px; }
    .reflection-body em { color: var(--foreground); font-style: normal; font-weight: 600; }

    /* ── Information Architecture ── */
    .ia-section-label {
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted-foreground); font-weight: 700; margin-bottom: 16px;
    }
    .ia-flow {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 12px; margin-top: 16px; align-items: stretch;
      position: relative;
    }
    @media (max-width: 760px) { .ia-flow { grid-template-columns: 1fr; gap: 14px; } }
    .ia-flow-step {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 14px;
      position: relative;
    }
    .ia-flow-step .n {
      font-size: 11px; font-weight: 700; color: var(--accent);
      letter-spacing: 0.08em; font-variant-numeric: tabular-nums;
    }
    .ia-flow-step .h { font-size: 14px; font-weight: 650; margin-top: 4px; letter-spacing: -0.005em; }
    .ia-flow-step .d { font-size: 12px; color: var(--muted-foreground); margin-top: 2px; line-height: 1.45; }
    .ia-flow-step + .ia-flow-step::before {
      content: "›"; position: absolute; left: -10px; top: 50%;
      transform: translateY(-50%); color: var(--muted-foreground);
      font-size: 18px; font-weight: 600; line-height: 1;
    }
    @media (max-width: 760px) {
      .ia-flow-step + .ia-flow-step::before {
        content: "↓"; left: 50%; top: -12px;
        transform: translateX(-50%);
      }
    }
    .ia-modules {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px;
      margin-top: 16px;
    }
    @media (max-width: 1000px) { .ia-modules { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 540px)  { .ia-modules { grid-template-columns: 1fr; } }
    .ia-module {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 22px 20px;
      transition: border-color 200ms;
    }
    .ia-module:hover { border-color: color-mix(in oklab, var(--accent) 35%, var(--border)); }
    .ia-module .h { font-size: 16px; font-weight: 700; letter-spacing: -0.005em; }
    .ia-module .en {
      font-size: 11px; color: var(--accent); font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px;
    }
    .ia-module .role {
      margin: 12px 0 14px; padding: 4px 10px;
      display: inline-block; border-radius: 999px;
      background: var(--muted); border: 1px solid var(--border);
      font-size: 11px; color: var(--muted-foreground); font-weight: 600;
      letter-spacing: 0.04em;
    }
    .ia-module ul { margin: 0; padding: 0; list-style: none; }
    .ia-module li {
      font-size: 12.5px; line-height: 1.55; color: var(--foreground);
      padding: 6px 0 6px 14px; position: relative;
      border-top: 1px dashed var(--border);
    }
    .ia-module li:first-child { border-top: none; padding-top: 0; }
    .ia-module li::before {
      content: ""; position: absolute; left: 0; top: 12px;
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    }
    .ia-module li:first-child::before { top: 6px; }
    .ia-admin {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
      margin-top: 16px;
    }
    @media (max-width: 1000px) { .ia-admin { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px)  { .ia-admin { grid-template-columns: 1fr; } }
    .ia-admin-card {
      background: var(--surface);
      border: 1px solid color-mix(in oklab, var(--foreground) 14%, var(--border));
      border-radius: var(--radius-xl); padding: 18px 20px;
      display: flex; flex-direction: column; gap: 8px; align-items: flex-start;
    }
    .ia-admin-card .h {
      font-size: 13px; font-weight: 700;
      letter-spacing: -0.005em; line-height: 1.45;
    }
    .ia-admin-card .d {
      font-size: 13px; color: var(--muted-foreground);
      line-height: 1.55;
    }

    /* ── Quick domain primer (Section 01 — small glossary cards under the heading) ── */
    .domain-label {
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted-foreground); font-weight: 700;
      margin: 24px 0 14px;
    }
    .domain-glossary {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; margin-bottom: 40px;
    }
    @media (max-width: 720px) { .domain-glossary { grid-template-columns: 1fr; } }
    .domain-card {
      background: var(--tint, var(--muted));
      border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px;
    }
    .domain-card .term {
      font-size: 14px; font-weight: 700; color: var(--accent);
      letter-spacing: -0.005em; margin-bottom: 6px; line-height: 1.35;
    }
    .domain-card .desc {
      font-size: 13px; line-height: 1.6;
      color: var(--muted-foreground); margin: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    window.PORTFOLIO_PATHS = {
      assets: "../",
      home: "../home/",
      works: ["../work-1-EdgePQM/", "../work-2-PVS/", "../work-3-ADJ/"]
    };
  </script>


  <script src="../content.shared.js"></script>
  <script src="content.js"></script>
  <script src="../image-protection.js"></script>
  <script src="../lightbox.js"></script>
  <script type="text/babel" src="../components/HeroUI.jsx"></script>
  <script type="text/babel" src="../components/Sections.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [lang, setLang] = useState(() => localStorage.getItem("kl-lang") || "zh");
      const [theme, setTheme] = useState(() => localStorage.getItem("kl-theme") || "light");
      const t = window.pickLang(window.PORTFOLIO_CONTENT, lang);
      const c = window.pickLang(window.WORK1_CONTENT, lang);
      const img = (base, fixedTheme) => `${window.PORTFOLIO_PATHS.assets}uploads/edge-pqm/${base}-${lang}-${fixedTheme || theme}.png`;

      useEffect(() => {
        document.documentElement.classList.toggle("dark", theme === "dark");
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.lang = lang === "zh" ? "zh-TW" : "en";
        localStorage.setItem("kl-theme", theme);
        localStorage.setItem("kl-lang", lang);
      }, [theme, lang]);

      return (
        <>
          <Nav lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} t={t} currentPage="detail" />

          {/* ── Hero ── */}
          <section className="detail-hero">
            <div className="container">
              <a href="../home/" className="back-link">{t.detail.back}</a>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
                {c.tags.map((tg, i) => <span className="tag" key={i}>{tg}</span>)}
              </div>
              <h1 style={{ fontSize: "clamp(32px, 5vw, 56px)", letterSpacing: "-0.025em", lineHeight: 1.1, marginBottom: 20 }}>
                {c.title}
              </h1>
              <p className="lead-lg" style={{ maxWidth: 720, fontSize: "clamp(17px, 1.6vw, 20px)", lineHeight: 1.6 }}>{c.tagline}</p>
              <div className="detail-meta" style={{ marginTop: 36 }}>
                {c.meta.map((m, i) => (
                  <div className="hero-meta-item" key={i}>
                    <span className="k" style={{ fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", color: "var(--muted-foreground)", fontWeight: 600 }}>{m.k}</span>
                    <span className="v" style={{ fontSize: 14, fontWeight: 500, marginTop: 4 }}>{m.v}</span>
                  </div>
                ))}
              </div>
              <div className="case-summary">
                {c.summary.map((item, i) => (
                  <div className="case-summary-card" key={i}>
                    <div className="k">{item.k}</div>
                    <p className="v">{item.v}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* ── Cover ── */}
          <section style={{ padding: "0 0 0" }}>
            <div className="container" style={{ maxWidth: 1200 }}>
              <img src={img('cover')} alt="Edge PQM 產線生產看板" className="cs-full-img" />
              <p style={{ textAlign: "center", fontSize: 13, color: "var(--muted-foreground)", marginTop: 12 }}>
                {c.title} · {c.captions.cover}
              </p>
            </div>
          </section>

          {/* ── 01 背景與挑戰 ── */}
          <section className="cs-section">
            <div className="container" style={{ maxWidth: 1100 }}>
              <div className="cs-num">{c.s1.num} / {c.s1.title}</div>
              <h2 className="cs-h2">{c.s1.title}</h2>

              {/* ── Quick domain primer (smart-manufacturing data sources) — driven by c.s1.domain ── */}
              {c.s1.domain && (
                <>
                  <div className="domain-label">{c.s1.domain.label}</div>
                  <div className="domain-glossary">
                    {c.s1.domain.terms.map((t, i) => (
                      <div className="domain-card" key={i}>
                        <div className="term">{t.h}</div>
                        <p className="desc">{t.d}</p>
                      </div>
                    ))}
                  </div>
                </>
              )}

              <div className="cs-2col">
                <div>
                  <p className="cs-body" dangerouslySetInnerHTML={{ __html: c.s1.p1 }} />
                  <p className="cs-body" style={{ marginTop: 16 }} dangerouslySetInnerHTML={{ __html: c.s1.p2 }} />
                  <div style={{
                    marginTop: 32, padding: "20px 24px",
                    background: "var(--accent-soft)", borderLeft: "3px solid var(--accent)",
                    borderRadius: "var(--radius)"
                  }}>
                    <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: "var(--accent-soft-foreground)", fontWeight: 700, marginBottom: 10 }}>
                      {c.s1.challenge_title}
                    </div>
                    <p style={{ margin: 0, fontSize: 15, lineHeight: 1.65, color: "var(--foreground)" }}>
                      {c.s1.challenge}
                    </p>
                  </div>
                </div>
                <div>
                  <img src={img('dashboard-full')} alt="產線生產看板全覽" className="cs-img" />
                  <p className="cs-img-caption">{c.captions.dashboard_full}</p>
                </div>
              </div>
            </div>
          </section>

          {/* ── 02 研究與洞察 ── */}
          <section className="cs-section" style={{ background: "var(--tint)" }}>
            <div className="container" style={{ maxWidth: 1100 }}>
              <div className="cs-num">{c.s2.num} / {c.s2.title}</div>
              <h2 className="cs-h2">{c.s2.title}</h2>
              <p className="cs-body">{c.s2.p1}</p>
              <div className="insight-grid">
                {c.s2.insights.map((ins, i) => (
                  <div className="insight-card" key={i}>
                    <div className="insight-num">{ins.n}</div>
                    <h4 className="insight-title">{ins.title}</h4>
                    <p className="insight-desc">{ins.desc}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* ── 03 設計決策 ── */}
          <section className="cs-section">
            <div className="container" style={{ maxWidth: 1100 }}>
              <div className="cs-num">{c.s3.num} / {c.s3.title}</div>
              <h2 className="cs-h2">{c.s3.title}</h2>
              <p className="cs-body">{c.s3.p1}</p>
              <div className="decision-list">
                {c.s3.decisions.map((d, i) => (
                  <div className="decision-item" key={i}>
                    <span className="decision-idx">{d.idx}</span>
                    <div>
                      <h4 className="decision-title">{d.title}</h4>
                      <p className="decision-body">{d.body}</p>
                    </div>
                    <div className="decision-img-col">
                      <img src={img(c.s3_images[i].base)} alt={c.s3_images[i].alt} className="cs-img" />
                      <p className="cs-img-caption">{c.s3_images[i].caption}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* ── 04 資訊架構 — Information Architecture ── */}
          <section className="cs-section">
            <div className="container" style={{ maxWidth: 1100 }}>
              <div className="cs-num">{c.s_ia.num} / {c.s_ia.title}</div>
              <h2 className="cs-h2">{c.s_ia.title}</h2>
              <p className="cs-body" dangerouslySetInnerHTML={{ __html: c.s_ia.p1 }} />

              <div style={{ marginTop: 48 }}>
                <div className="ia-section-label">{c.s_ia.flow_label}</div>
                <div className="ia-flow">
                  {c.s_ia.flow.map((s, i) => (
                    <div className="ia-flow-step" key={i}>
                      <div className="n">{s.n}</div>
                      <div className="h">{s.h}</div>
                      <div className="d">{s.d}</div>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ marginTop: 48 }}>
                <div className="ia-section-label">{c.s_ia.modules_label}</div>
                <div className="ia-modules">
                  {c.s_ia.modules.map((m, i) => (
                    <div className="ia-module" key={i}>
                      <div className="h">{m.h}</div>
                      <div className="en">{m.en}</div>
                      <div className="role">{m.role}</div>
                      <ul>{m.pages.map((p, j) => <li key={j}>{p}</li>)}</ul>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ marginTop: 48 }}>
                <div className="ia-section-label">{c.s_ia.admin_label}</div>
                <div className="ia-admin">
                  {c.s_ia.admin.map((a, i) => (
                    <div className="ia-admin-card" key={i}>
                      <div className="h">{a.h}</div>
                      <div className="d">{a.d}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </section>

          {/* ── 05 視覺設計 ── */}
          <section className="cs-section" style={{ background: "var(--tint)" }}>
            <div className="container" style={{ maxWidth: 1100 }}>
              <div className="cs-num">{c.s4.num} / {c.s4.title}</div>
              <h2 className="cs-h2">{c.s4.title}</h2>
              <p className="cs-body" dangerouslySetInnerHTML={{ __html: c.s4.p1 }} />
              <p className="cs-body" style={{ marginTop: 16 }} dangerouslySetInnerHTML={{ __html: c.s4.p2 }} />
              {c.s4.p3 && (
                <p className="cs-body" style={{
                  marginTop: 20, padding: "16px 22px",
                  background: "var(--accent-soft)",
                  borderLeft: "3px solid var(--accent)",
                  borderRadius: "var(--radius)",
                  color: "var(--foreground)"
                }} dangerouslySetInnerHTML={{ __html: c.s4.p3 }} />
              )}
              <div style={{ marginTop: 40, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
                <div>
                  <img src={img('cover', 'light')} alt="Light 主題" className="cs-img" />
                  <p className="cs-img-caption">{c.captions.theme_light}</p>
                </div>
                <div>
                  <img src={img('dark-theme', 'dark')} alt="Dark 主題" className="cs-img" />
                  <p className="cs-img-caption">{c.captions.theme_dark}</p>
                </div>
              </div>
              <div style={{ marginTop: 24 }}>
                <img src={img('equipment')} alt="設備狀態看板" className="cs-img" />
                <p className="cs-img-caption" style={{ textAlign: "center" }}>{c.captions.equipment}</p>
              </div>
            </div>
          </section>

          {/* ── 06 成果與反思 ── */}
          <section className="cs-section">
            <div className="container" style={{ maxWidth: 1100 }}>
              <div className="cs-num">{c.s5.num} / {c.s5.title}</div>
              <h2 className="cs-h2">{c.s5.title}</h2>
              <p className="cs-body">{c.s5.p1}</p>
              <div className="outcome-grid">
                {c.s5.outcomes.map((o, i) => (
                  <div className="outcome-card" key={i}>
                    <div className="outcome-n">{o.n}</div>
                    <div className="outcome-l">{o.l}</div>
                  </div>
                ))}
              </div>
              <div style={{
                marginTop: 56, padding: "32px 36px",
                background: "var(--surface)", border: "1px solid var(--border)",
                borderRadius: "var(--radius-2xl)"
              }}>
                <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: "var(--muted-foreground)", fontWeight: 700, marginBottom: 14 }}>
                  {c.s5.reflection_title}
                </div>
                <div style={{ fontSize: "clamp(16px, 1.4vw, 18px)", lineHeight: 1.7, color: "var(--foreground)" }}
                  className="reflection-body"
                  dangerouslySetInnerHTML={{ __html: c.s5.reflection }} />
              </div>
            </div>
          </section>

          {/* ── Prev / Next ── */}
          <section style={{ borderTop: "1px solid var(--border)", padding: "48px 0" }}>
            <div className="container" style={{ display: "flex", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
              <a href="../home/#works" className="button button--outline">
                {c.nav.back_to_works}
              </a>
              <a href="../work-2-PVS/" className="button button--outline">
                {c.nav.next}
              </a>
            </div>
          </section>

          <Footer t={t} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
