<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kris | PVS</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="stylesheet" href="../styles/heroui-tokens.css" />
  <link rel="stylesheet" href="../styles/heroui-kit.css" />
  <link rel="stylesheet" href="../styles/portfolio.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    window.PORTFOLIO_PATHS = {
      assets: "../",
      home: "../home/",
      works: ["../work-1-EdgePQM/", "../work-2-PVS/", "../work-3-ADJ/"]
    };
  </script>


  <script src="../content.shared.js"></script>
  <script src="content.js"></script>
  <script src="../image-protection.js"></script>
  <script src="../lightbox.js"></script>
  <script type="text/babel" src="../components/HeroUI.jsx"></script>
  <script type="text/babel" src="../components/Sections.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Read ?work=1 from URL or filename
    function getWorkIndex() {
      const url = new URL(window.location.href);
      const fromQuery = url.searchParams.get("work");
      if (fromQuery) return parseInt(fromQuery, 10) - 1;
      const m = url.pathname.match(/work-(\d+)(?:\.html)?/);
      if (m) return parseInt(m[1], 10) - 1;
      return 0;
    }

    function App() {
      const [lang, setLang] = useState(() => localStorage.getItem("kl-lang") || "zh");
      const [theme, setTheme] = useState(() => localStorage.getItem("kl-theme") || "light");
      const idx = getWorkIndex();
      const t = window.pickLang(window.PORTFOLIO_CONTENT, lang);
      const c = window.pickLang(window.WORK2_CONTENT, lang);

      useEffect(() => {
        document.documentElement.classList.toggle("dark", theme === "dark");
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("kl-theme", theme);
      }, [theme]);

      useEffect(() => {
        document.documentElement.lang = lang === "zh" ? "zh-TW" : "en";
        localStorage.setItem("kl-lang", lang);
      }, [lang]);

      return (
        <>
          <Nav lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} t={t} currentPage="detail" />

          <section className="detail-hero">
            <div className="container">
              <a href="../home/" className="back-link">{t.detail.back}</a>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
                <span className="tag tag-accent num">{c.year}</span>
                {c.tags.map((tg, i) => <span className="tag" key={i}>{tg}</span>)}
              </div>
              <h1>{c.title}</h1>
              <p className="lead-lg" style={{ maxWidth: 720, fontSize: 20 }}>{c.tagline}</p>

              <div className="detail-meta">
                {c.meta.map((m, i) => (
                  <div className="hero-meta-item" key={i}>
                    <span className="k" style={{ fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", color: "var(--muted-foreground)", fontWeight: 600 }}>{m.k}</span>
                    <span className="v" style={{ fontSize: 14, fontWeight: 500, marginTop: 4 }}>{m.v}</span>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section className="section-tight">
            <div className="container">
              <div className="detail-cover">
                <WorkPlaceholderArt index={idx} />
              </div>
            </div>
          </section>

          <section className="section">
            <div className="container" style={{ maxWidth: 760 }}>
              <div style={{
                background: "var(--tint)",
                border: "1px solid var(--border)",
                borderRadius: "var(--radius-2xl)",
                padding: "48px 32px",
                textAlign: "center"
              }}>
                <div style={{
                  width: 56, height: 56, borderRadius: "50%",
                  background: "var(--accent-soft)", color: "var(--accent)",
                  display: "inline-flex", alignItems: "center", justifyContent: "center",
                  marginBottom: 20, fontSize: 24
                }}>✦</div>
                <h2 className="display-sm" style={{ margin: "0 0 12px", fontSize: "clamp(24px, 3vw, 32px)" }}>
                  {t.detail.coming}
                </h2>
                <p style={{ color: "var(--muted-foreground)", fontSize: 16, margin: "0 auto", maxWidth: 480, lineHeight: 1.6 }}>
                  {c.placeholder.coming_long}
                </p>
                <a href="../home/" className="button button--primary" style={{ marginTop: 24 }}>
                  {c.placeholder.back_to_works}
                  <PIcon d={ICONS.arrow} size={16} />
                </a>
              </div>

              {/* Outline of typical case-study sections (placeholder skeleton) */}
              <div style={{ marginTop: 80 }}>
                <span className="section-label">
                  {c.placeholder.case_outline_label}
                </span>
                <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 12, marginTop: 12 }}>
                  {c.placeholder.case_outline.map(({ n, title, desc }, i) => (
                    <div key={i} style={{
                      display: "grid",
                      gridTemplateColumns: "60px 1fr",
                      gap: 24,
                      padding: "20px 0",
                      borderTop: "1px solid var(--border)",
                      alignItems: "start"
                    }}>
                      <span className="num" style={{ fontWeight: 600, color: "var(--muted-foreground)", fontSize: 13, letterSpacing: "0.06em" }}>{n}</span>
                      <div>
                        <h4 style={{ margin: "0 0 4px", fontSize: 18, fontWeight: 600, letterSpacing: "-0.01em" }}>{title}</h4>
                        <p style={{ margin: 0, color: "var(--muted-foreground)", fontSize: 14, lineHeight: 1.6 }}>{desc}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </section>

          {/* Next/Prev navigation */}
          <section style={{ borderTop: "1px solid var(--border)", padding: "48px 0" }}>
            <div className="container" style={{ display: "flex", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
              <a href="../work-1-EdgePQM/" className="button button--outline">
                {c.nav.prev}
              </a>
              <a href="../work-3-ADJ/" className="button button--outline">
                {c.nav.next}
              </a>
            </div>
          </section>

          <Footer t={t} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
