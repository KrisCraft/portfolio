<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AOI · Auto Defect Judgement — Kris Lu</title>
  <link rel="stylesheet" href="styles/heroui-tokens.css" />
  <link rel="stylesheet" href="styles/heroui-kit.css" />
  <link rel="stylesheet" href="styles/portfolio.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    .cs-section { padding: 80px 0; }
    .cs-section + .cs-section { border-top: 1px solid var(--border); }
    .cs-num {
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--accent); font-weight: 700; margin-bottom: 12px;
    }
    .cs-h2 {
      font-size: clamp(26px, 3vw, 36px); font-weight: 700;
      letter-spacing: -0.02em; line-height: 1.2; margin: 0 0 24px;
    }
    .cs-body {
      font-size: clamp(16px, 1.4vw, 18px); line-height: 1.7;
      color: var(--muted-foreground); max-width: 680px;
    }
    .cs-body + .cs-body { margin-top: 16px; }
    .cs-body em { color: var(--foreground); font-style: normal; font-weight: 600; }
    .cs-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
    @media (max-width: 860px) { .cs-2col { grid-template-columns: 1fr; gap: 40px; } }

    .cs-img {
      width: 100%; border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      display: block;
    }
    .cs-full-img {
      width: 100%; border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      box-shadow: 0 12px 48px rgba(0,0,0,0.13);
      display: block; margin: 0 auto;
    }
    .cs-img-caption {
      font-size: 13px; color: var(--muted-foreground);
      margin-top: 10px; line-height: 1.5;
    }

    .insight-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 40px; }
    @media (max-width: 860px) { .insight-grid { grid-template-columns: 1fr; } }
    .insight-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 28px 24px;
      transition: border-color 200ms, transform 200ms;
    }
    .insight-card:hover { border-color: color-mix(in oklab, var(--accent) 40%, var(--border)); transform: translateY(-2px); }
    .insight-num {
      font-size: 32px; font-weight: 800; color: var(--accent);
      letter-spacing: -0.03em; line-height: 1; margin-bottom: 14px;
      font-variant-numeric: tabular-nums;
    }
    .insight-title { font-size: 16px; font-weight: 650; margin: 0 0 8px; }
    .insight-desc { font-size: 14px; color: var(--muted-foreground); line-height: 1.6; margin: 0; }

    .decision-list { display: flex; flex-direction: column; gap: 40px; margin-top: 40px; }
    .decision-item {
      display: grid; grid-template-columns: 56px 1fr 360px;
      gap: 0 32px; align-items: start;
      padding-top: 32px; border-top: 1px solid var(--border);
    }
    .decision-item:first-child { border-top: none; padding-top: 0; }
    @media (max-width: 960px) {
      .decision-item { grid-template-columns: 56px 1fr; }
      .decision-img-col { display: none; }
    }
    .decision-idx {
      font-size: 13px; font-weight: 700; color: var(--muted-foreground);
      letter-spacing: 0.06em; padding-top: 3px;
    }
    .decision-title { font-size: 19px; font-weight: 650; margin: 0 0 10px; letter-spacing: -0.01em; }
    .decision-body { font-size: 15px; color: var(--muted-foreground); line-height: 1.65; margin: 0; }
    .decision-body em { color: var(--foreground); font-style: normal; font-weight: 600; }

    .outcome-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 40px; }
    @media (max-width: 860px) { .outcome-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .outcome-grid { grid-template-columns: 1fr; } }
    .outcome-card {
      background: var(--tint, var(--muted)); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 28px 20px; text-align: center;
    }
    .outcome-n { font-size: 36px; font-weight: 800; color: var(--accent); letter-spacing: -0.03em; line-height: 1.1; }
    .outcome-l { font-size: 13px; color: var(--muted-foreground); margin-top: 8px; line-height: 1.4; white-space: pre-line; }

    .case-summary {
      margin-top: 36px; display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 860px) { .case-summary { grid-template-columns: 1fr; } }
    .case-summary-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 18px 20px;
    }
    .case-summary-card .k {
      font-size: 11px; color: var(--accent); font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px;
    }
    .case-summary-card .v {
      font-size: 14px; color: var(--foreground); line-height: 1.6; margin: 0;
    }

    .reflection-body p { margin: 0; }
    .reflection-body p + p { margin-top: 18px; }
    .reflection-body em { color: var(--foreground); font-style: normal; font-weight: 600; }

    /* ── Section-01 supporting card ── */
    .pain-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 0; border-bottom: 1px dashed var(--border);
    }
    .pain-row:last-child { border-bottom: none; }
    .pain-tag {
      flex: 0 0 auto; font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; padding: 4px 10px; border-radius: 999px;
      background: color-mix(in oklab, #ef4444 12%, transparent);
      color: #ef4444; text-transform: uppercase;
    }
    .pain-text { font-size: 14px; line-height: 1.55; color: var(--foreground); }
    .pain-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
    }

    /* ── Capability map (data/model/operation) ── */
    .capability-map {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
      margin-top: 24px;
    }
    @media (max-width: 720px) { .capability-map { grid-template-columns: 1fr; } }
    .cap-block {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 22px 20px;
    }
    .cap-block h5 {
      margin: 0 0 12px; font-size: 12px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent);
    }
    .cap-block ul { margin: 0; padding: 0; list-style: none; }
    .cap-block li {
      font-size: 13px; line-height: 1.55; color: var(--foreground);
      padding: 5px 0; padding-left: 16px; position: relative;
    }
    .cap-block li::before {
      content: "•"; color: var(--accent);
      position: absolute; left: 4px; top: 5px;
    }

    /* ── Before vs After comparison ── */
    .compare-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0;
      margin-top: 28px; border: 1px solid var(--border);
      border-radius: var(--radius-xl); overflow: hidden;
    }
    @media (max-width: 720px) { .compare-grid { grid-template-columns: 1fr; } }
    .compare-col { padding: 24px; }
    .compare-col + .compare-col { border-left: 1px solid var(--border); }
    @media (max-width: 720px) {
      .compare-col + .compare-col { border-left: none; border-top: 1px solid var(--border); }
    }
    .compare-col.before { background: color-mix(in oklab, var(--muted-foreground) 4%, transparent); }
    .compare-col.after  { background: color-mix(in oklab, var(--accent) 6%, transparent); }
    .compare-label {
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      font-weight: 700; margin-bottom: 14px;
    }
    .compare-col.before .compare-label { color: var(--muted-foreground); }
    .compare-col.after .compare-label { color: var(--accent); }
    .compare-col ul { margin: 0; padding-left: 18px; }
    .compare-col li {
      font-size: 14px; line-height: 1.7; color: var(--foreground);
      margin-bottom: 6px;
    }

    /* ── Labeling visual grid ── */
    .label-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
      margin-top: 40px;
    }
    @media (max-width: 860px) { .label-grid { grid-template-columns: 1fr; } }

    /* ── Information Architecture ── */
    .ia-section-label {
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted-foreground); font-weight: 700; margin-bottom: 16px;
    }
    .ia-flow {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 12px; margin-top: 16px; align-items: stretch;
      position: relative;
    }
    @media (max-width: 760px) { .ia-flow { grid-template-columns: 1fr; gap: 14px; } }
    .ia-flow-step {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 14px;
      position: relative;
    }
    .ia-flow-step .n {
      font-size: 11px; font-weight: 700; color: var(--accent);
      letter-spacing: 0.08em; font-variant-numeric: tabular-nums;
    }
    .ia-flow-step .h { font-size: 14px; font-weight: 650; margin-top: 4px; letter-spacing: -0.005em; }
    .ia-flow-step .d { font-size: 12px; color: var(--muted-foreground); margin-top: 2px; line-height: 1.45; }
    .ia-flow-step + .ia-flow-step::before {
      content: "›"; position: absolute; left: -10px; top: 50%;
      transform: translateY(-50%); color: var(--muted-foreground);
      font-size: 18px; font-weight: 600; line-height: 1;
    }
    @media (max-width: 760px) {
      .ia-flow-step + .ia-flow-step::before {
        content: "↓"; left: 50%; top: -12px;
        transform: translateX(-50%);
      }
    }

    .ia-modules {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px;
      margin-top: 16px;
    }
    @media (max-width: 1000px) { .ia-modules { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 540px)  { .ia-modules { grid-template-columns: 1fr; } }
    .ia-module {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 22px 20px;
      transition: border-color 200ms;
    }
    .ia-module:hover { border-color: color-mix(in oklab, var(--accent) 35%, var(--border)); }
    .ia-module .h { font-size: 16px; font-weight: 700; letter-spacing: -0.005em; }
    .ia-module .en {
      font-size: 11px; color: var(--accent); font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px;
    }
    .ia-module .role {
      margin: 12px 0 14px; padding: 4px 10px;
      display: inline-block; border-radius: 999px;
      background: var(--muted); border: 1px solid var(--border);
      font-size: 11px; color: var(--muted-foreground); font-weight: 600;
      letter-spacing: 0.04em;
    }
    .ia-module ul { margin: 0; padding: 0; list-style: none; }
    .ia-module li {
      font-size: 12.5px; line-height: 1.55; color: var(--foreground);
      padding: 6px 0 6px 14px; position: relative;
      border-top: 1px dashed var(--border);
    }
    .ia-module li:first-child { border-top: none; padding-top: 0; }
    .ia-module li::before {
      content: ""; position: absolute; left: 0; top: 12px;
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    }
    .ia-module li:first-child::before { top: 6px; }

    .ia-admin {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
      margin-top: 16px;
    }
    @media (max-width: 760px) { .ia-admin { grid-template-columns: 1fr; } }
    .ia-admin-card {
      background: var(--surface);
      border: 1px solid color-mix(in oklab, var(--foreground) 14%, var(--border));
      border-radius: var(--radius-xl); padding: 18px 20px;
      display: flex; gap: 18px; align-items: flex-start;
    }
    .ia-admin-card .h {
      flex: 0 0 auto; font-size: 13px; font-weight: 700;
      letter-spacing: -0.005em; padding-top: 1px;
      min-width: 110px;
    }
    .ia-admin-card .d {
      flex: 1 1 auto; font-size: 13px; color: var(--muted-foreground);
      line-height: 1.55;
    }

    /* ── Algorithm engines (two-engine layout) ── */
    .engine-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
      margin-top: 32px;
    }
    @media (max-width: 760px) { .engine-grid { grid-template-columns: 1fr; } }
    .engine-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 28px 24px;
      transition: border-color 200ms;
    }
    .engine-card:hover { border-color: color-mix(in oklab, var(--accent) 40%, var(--border)); }
    .engine-card h4 { margin: 0 0 4px; font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }
    .engine-card .algo {
      font-size: 11px; color: var(--accent); font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 18px;
    }
    .engine-row {
      display: flex; gap: 12px; padding: 9px 0;
      border-bottom: 1px dashed var(--border);
    }
    .engine-row:last-of-type { border-bottom: none; }
    .engine-row .k {
      flex: 0 0 70px; font-size: 11px; color: var(--muted-foreground);
      font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding-top: 2px;
    }
    .engine-row .v { font-size: 13px; color: var(--foreground); line-height: 1.55; }
    .engine-card .why {
      margin: 16px 0 0; padding-top: 14px; border-top: 1px solid var(--border);
      font-size: 13px; line-height: 1.6; color: var(--muted-foreground);
    }
    .engine-card .why em { color: var(--accent); font-style: normal; font-weight: 600; }

    /* ── Operations highlights ── */
    .ops-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
      margin-top: 36px;
    }
    @media (max-width: 760px) { .ops-grid { grid-template-columns: 1fr; } }
    .ops-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 22px 20px;
    }
    .ops-card .h {
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted-foreground); font-weight: 700;
    }
    .ops-card .v {
      font-size: 28px; font-weight: 800; color: var(--accent);
      margin-top: 8px; line-height: 1.05; letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }
    .ops-card .u { font-size: 12px; color: var(--muted-foreground); margin-top: 2px; font-weight: 600; }
    .ops-card .d { font-size: 13px; color: var(--foreground); margin-top: 12px; line-height: 1.6; }

    .ops-img-grid {
      display: flex; flex-direction: column; gap: 36px;
      margin-top: 36px;
    }
    .ops-img-grid img { width: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const C = {
      zh: {
        title: "AOI · Auto Defect Judgement",
        tagline: "把資料科學家才能操作的 AI 模型訓練流程，變成現場製程工程師能上手的 AOI 瑕疵覆判系統",
        meta: [
          { k: "角色", v: "UX Designer" },
          { k: "團隊", v: "Designer × 1 · Data Scientist × 2 · Engineer × 2 · PM × 1" },
          { k: "時程", v: "2023 — 2024" },
          { k: "工具", v: "Figma · Jira · Confluence" }
        ],
        tags: ["UX Design", "AI / MLOps", "AOI", "Smart SMT", "Industrial AI"],
        summary: [
          { k: "Problem", v: "傳統 ADC 是資料科學家工具，現場工程師被卡在人工清洗、逐張標註與不可重訓的模型流程。" },
          { k: "My Impact", v: "把 MLOps 拆成可操作模組，設計 Dataset / Batch / Filter、Auto Labeling、RCL-ROI 輔助與模型信任機制。" },
          { k: "Outcome", v: "AI 約替代一半人工覆判量，保守模型實驗下 0 漏檢，工廠約 30 天可自主啟動 AI 輔助。" }
        ],
        s1: {
          num: "01",
          title: "背景與挑戰",
          p1: "ADJ（Auto Defect Judgement）是 AOI(自動光學檢測) 設備的 AI 自動瑕疵覆判系統。它接收 AOI 自動光學檢測的影像，提供 <em>AOI + AI 二階覆判</em> 解決方案，並支援自主模型訓練，讓推論模型能持續迭代符合不同產品線的需求。",
          p2: "我以 <em>UX Designer</em> 加入這個專案，挑戰不只是把畫面做好——而是要把整個傳統 ADC（Auto Defect Classification）的工作流，重新拆解成現場製程工程師、技術員都能操作的步驟。原本的系統是「資料科學家專用工具」，我的工作是讓它變成「車間生產工具」。",
          challenge_title: "核心挑戰",
          challenge: "在「少量多樣」生產環境下，AOI 誤殺率高（NDF）、製程根因難追溯；傳統 ADC 又需要 DS 人工清洗數據、人工標註每張圖、模型無法重訓來符合各種產線的需求——四個系統性瓶頸要被同時拆掉。"
        },
        pains_title: "傳統 ADC 的四個瓶頸",
        pains_caption: "ADJ 同時拆解的四個系統性問題",
        pains: [
          { tag: "誤殺", text: "AOI 判 NG 但實際無瑕（No Defect Found），造成大量人工複檢成本" },
          { tag: "盲區", text: "無法主動分類瑕疵類型，難結合生產／測試數據定位製程根因" },
          { tag: "瓶頸", text: "DS 需人工清洗歷史數據集、仰賴大量人員手動標註每張圖" },
          { tag: "僵化", text: "演算法綁定訓練流程，無法根據不同產品線重訓、無法多模型同時部署運行" }
        ],
        s2: {
          num: "02",
          title: "研究與洞察",
          p1: "與 DS 團隊、製程工程師、AOI 機台操作員深度訪談，盤點當前的工作流。三個關鍵洞察改變了系統的設計方向：",
          insights: [
            {
              n: "01",
              title: "操作的人不是訓練模型的人",
              desc: "現場工程師懂瑕疵、懂製程，但不是資料科學家。介面不能要求他們設定複雜的演算法參數，而要讓他們專注在「這張圖該分到哪一類」、「這個模型可以上線了嗎」這種專業判斷上。"
            },
            {
              n: "02",
              title: "資料標註才是真正的工作量",
              desc: "模型訓練本身只是流程的一小部分。前端的資料清洗、分類、標註、批次切分，才是時間真正消耗的地方。系統必須把資料的「來源 → 整形 → 規則篩選」變成一條清楚的軌道。"
            },
            {
              n: "03",
              title: "導入 CFX 工業標準格式，自動帶 metadata，讓標註可以大幅省掉",
              desc: "AOI 透過 IPC-CFX 上拋的影像本來就帶有元件類型、檢測項目等 metadata。如果系統能直接消化這些欄位，使用者只需「審核」而非「重新標註」——這是從工作流上根本減負的關鍵。"
            }
          ]
        },
        s3: {
          num: "03",
          title: "設計決策",
          p1: "基於研究發現，我做了四個關鍵的設計決策，重塑了 ADJ 的工作流：",
          decisions: [
            {

              <p className="cs-img-caption" style={{ textAlign: "center", marginTop: 14 }}>
                {c.feature.caption}
              </p>
            </div>
          </section>

          {/* ── 08 運營亮點 — Operations Highlights ── */}
          <section className="cs-section">
            <div className="container" style={{ maxWidth: 1100 }}>
              <div className="cs-num">{c.s_ops.num} / {c.s_ops.title}</div>
              <h2 className="cs-h2">{c.s_ops.title}</h2>
              <p className="cs-body" dangerouslySetInnerHTML={{ __html: c.s_ops.p1 }} />

              <div className="ops-grid">
                {c.s_ops.ops.map((o, i) => (
                  <div className="ops-card" key={i}>
                    <div className="h">{o.h}</div>
                    <div className="v">{o.v}</div>
                    <div className="u">{o.u}</div>
                    <div className="d">{o.d}</div>
                  </div>
                ))}
              </div>

              <div className="ops-img-grid">
                {c.s_ops.ops_imgs.map((it, i) => (
                  <div key={i}>
                    <img src={img(it.src)} alt={it.caption} className="cs-img" />
                    <p className="cs-img-caption">{it.caption}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* ── 09 Legacy ADC vs ADJ ── */}
          <section className="cs-section" style={{ background: "var(--tint)" }}>
            <div className="container" style={{ maxWidth: 1100 }}>
              <div className="cs-num">{c.s6.num} / {c.s6.title}</div>
              <h2 className="cs-h2">{c.s6.title}</h2>
              <p className="cs-body">{c.s6.p1}</p>
              <div className="compare-grid">
                <div className="compare-col before">
                  <div className="compare-label">{c.s6.before_label}</div>
                  <ul>{c.s6.before.map((it, i) => <li key={i}>{it}</li>)}</ul>
                </div>
                <div className="compare-col after">
                  <div className="compare-label">{c.s6.after_label}</div>
                  <ul>{c.s6.after.map((it, i) => <li key={i}>{it}</li>)}</ul>
                </div>
              </div>
            </div>
          </section>

          {/* ── 10 成果與反思 ── */}
          <section className="cs-section">
            <div className="container" style={{ maxWidth: 1100 }}>
              <div className="cs-num">{c.s5.num} / {c.s5.title}</div>
              <h2 className="cs-h2">{c.s5.title}</h2>
              <p className="cs-body">{c.s5.p1}</p>
              <div className="outcome-grid">
                {c.s5.outcomes.map((o, i) => (
                  <div className="outcome-card" key={i}>
                    <div className="outcome-n">{o.n}</div>
                    <div className="outcome-l">{o.l}</div>
                  </div>
                ))}
              </div>
              <div style={{
                marginTop: 56, padding: "32px 36px",
                background: "var(--surface)", border: "1px solid var(--border)",
                borderRadius: "var(--radius-2xl)"
              }}>
                <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: "var(--muted-foreground)", fontWeight: 700, marginBottom: 14 }}>
                  {c.s5.reflection_title}
                </div>
                <div style={{ fontSize: "clamp(16px, 1.4vw, 18px)", lineHeight: 1.7, color: "var(--foreground)" }}
                  className="reflection-body"
                  dangerouslySetInnerHTML={{ __html: c.s5.reflection }} />
              </div>
            </div>
          </section>

          {/* ── Prev / Next ── */}
          <section style={{ borderTop: "1px solid var(--border)", padding: "48px 0" }}>
            <div className="container" style={{ display: "flex", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
              <a href="work-2.html" className="button button--outline">
                {lang === "zh" ? "← 上一個作品" : "← Previous Case"}
              </a>
              <a href="index.html#works" className="button button--outline">
                {lang === "zh" ? "返回作品列表 →" : "All Works →"}
              </a>
            </div>
          </section>

          <Footer t={t} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
